<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geospatial Intelligence Engine</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="panel">
          <h1>Common Intelligence Picture</h1>
          <div class="meta-row">
            <span id="service-status">Loading…</span>
            <span id="generated-at"></span>
          </div>
        </div>

        <div class="panel">
          <label class="label" for="market-select">Market</label>
          <select id="market-select">
            <option value="all">All markets</option>
          </select>

          <div class="checkbox-row">
            <label><input type="checkbox" id="toggle-construction" checked /> Construction</label>
          </div>
          <div class="checkbox-row">
            <label><input type="checkbox" id="toggle-cameras" checked /> Cameras</label>
          </div>
        </div>

        <div class="panel">
          <h2>Counts</h2>
          <div id="counts"></div>
        </div>

        <div class="panel">
          <h2>Legend</h2>
          <div class="legend-row"><span class="swatch construction"></span> Construction</div>
          <div class="legend-row"><span class="swatch camera"></span> Camera</div>
        </div>
      </aside>

      <main id="main">
        <div id="map"></div>
        <aside id="details">
          <div class="details-empty" id="details-empty">
            Select a construction feature to inspect candidate cameras.
          </div>
          <div id="details-content" class="hidden"></div>
        </aside>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
